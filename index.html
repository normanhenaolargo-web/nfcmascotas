<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mascota NFC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#145a4a,#2ecc71);
padding:20px;
}

/* TARJETA */
.tarjeta{
max-width:500px;
margin:auto;
background:#fffaf3;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* HEADER */
.header{
background:linear-gradient(180deg,#1e6f5c,#27ae60);
padding:35px 20px;
text-align:center;
}

.header h1{
color:white;
font-size:38px;
margin-top:10px;
}

/* FOTO */
.foto{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:7px solid white;
box-shadow:0 5px 20px rgba(0,0,0,.25);
}

/* MENSAJE (más oscuro y legible como pediste) */
.mensaje{
background:#2c3e50;
margin:20px;
padding:18px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
color:#ffffff;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

/* CONTENIDO */
.contenido{
padding:10px 25px 25px;
}

.item{
padding:14px 0;
border-bottom:1px solid #e6e6e6;
font-size:18px;
}

.etiqueta{
font-weight:bold;
color:#2d3436;
}

.valor{
color:#444;
}

/* BOTÓN */
.llamar{
display:block;
background:linear-gradient(135deg,#27ae60,#1e8449);
color:white;
text-decoration:none;
text-align:center;
padding:18px;
margin:25px;
border-radius:15px;
font-size:22px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<div class="tarjeta">

<div class="header">
<img id="foto" class="foto"
src="https://i.postimg.cc/bJ8mLpMk/b705cacc-1420-460f-8abd-6b98fa37a7fb.jpg">

<h1 id="nombre">🐾 MASCOTA</h1>
</div>

<div class="mensaje">
❤️ Si me encuentras, ayúdame a volver a casa ❤️
</div>

<div class="contenido">

<div class="item"><span class="etiqueta">Propietario:</span> <span class="valor" id="propietario">---</span></div>

<div class="item"><span class="etiqueta">Teléfono:</span> <span class="valor" id="telefono">---</span></div>

<div class="item"><span class="etiqueta">Ubicación:</span> <span class="valor" id="ubicacion">---</span></div>

<div class="item"><span class="etiqueta">Raza:</span> <span class="valor" id="raza">---</span></div>

<div class="item"><span class="etiqueta">Color:</span> <span class="valor" id="color">---</span></div>

<div class="item"><span class="etiqueta">Alimento:</span> <span class="valor" id="alimento">---</span></div>

<div class="item"><span class="etiqueta">Observación:</span> <span class="valor" id="observacion">---</span></div>
<div class="item"><span class="etiqueta">Nacimiento:</span> <span class="valor" id="nacimiento">---</span></div>
</div>

<a id="llamar" class="llamar" href="#">
📞 LLAMAR AL PROPIETARIO
</a>

<div class="footer">
Mascota protegida con NFC
</div>

</div>

<script>
const p = new URLSearchParams(window.location.search);
const id = p.get("id");

if(id){
document.getElementById("nombre").innerText = "🐾 " + id;
}

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQSARinGx0hHulqUVOE27x-VuOXTXs7e5z4Y84zZVpe8hNG1EY7M3sE5f58T9dViyK6nOv95JX-sjD6/pub?output=csv")
.then(r => r.text())
.then(csv => {

const filas = csv.split("\n");

for(let i = 1; i < filas.length; i++){

const c = filas[i].split(",");

if(c[0] && c[0].trim() === id){

document.getElementById("nombre").innerText = "🐾 " + (c[1] || "");
document.getElementById("propietario").innerText = c[2] || "";
document.getElementById("telefono").innerText = c[3] || "";
document.getElementById("alimento").innerText = c[4] || "";
document.getElementById("observacion").innerText = c[5] || "";
document.getElementById("nacimiento").innerText = c[6] || "";
document.getElementById("color").innerText = c[7] || "";

if(c[8]){
document.getElementById("foto").src = c[8];
}

if(c[3]){
document.getElementById("llamar").href = "tel:" + c[3];
}

break;
}
}
});
</script>

</body>
</html>
