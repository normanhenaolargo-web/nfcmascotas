<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mascota NFC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --forest-900:#0F3D33;
  --forest-700:#1B5E4F;
  --green-500:#2F9E6E;
  --cream:#FBF7EF;
  --ink-900:#1E2A22;
  --ink-600:#5C6960;
  --gold-500:#E4A73B;
  --gold-600:#C98A22;
  --line:#E3DCC9;
  --radius-card: clamp(18px, 4vw, 28px);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  -webkit-text-size-adjust:100%;
}

body{
  font-family:'Inter', Arial, sans-serif;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 60%),
    linear-gradient(180deg, var(--forest-900), var(--forest-700) 55%, #133b31 100%);
  min-height:100vh;
  padding: clamp(16px, 5vw, 40px) clamp(12px, 4vw, 20px);
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

/* ---------- LOADER ---------- */
#cargando{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
  background:linear-gradient(180deg, var(--forest-900), var(--forest-700));
  color:#EFE6D2;
  font-size:clamp(15px, 4vw, 18px);
  font-weight:600;
  z-index:50;
  text-align:center;
  padding:20px;
}
.spinner{
  width:34px;
  height:34px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.25);
  border-top-color:var(--gold-500);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ---------- TARJETA ---------- */
.tarjeta{
  width:100%;
  max-width:440px;
  background:var(--cream);
  border-radius:var(--radius-card);
  overflow:hidden;
  box-shadow:
    0 30px 60px -15px rgba(0,0,0,.45),
    0 10px 25px -10px rgba(0,0,0,.3);
  animation:cardIn .5s ease both;
}
@keyframes cardIn{
  from{ opacity:0; transform:translateY(14px); }
  to{ opacity:1; transform:translateY(0); }
}

/* ---------- HEADER ---------- */
.header{
  position:relative;
  background:
    radial-gradient(120% 100% at 50% -10%, rgba(255,255,255,.14), transparent 55%),
    linear-gradient(160deg, var(--forest-700), var(--forest-900));
  padding: clamp(24px,7vw,34px) clamp(18px,6vw,28px) clamp(26px,7vw,36px);
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

/* patitas decorativas de fondo */
.pata{
  position:absolute;
  font-size: clamp(20px, 6vw, 30px);
  fill: var(--gold-500);
  opacity:.4;
  pointer-events:none;
  user-select:none;
}
.pata.p1{ top:14px;    left:10px;   transform:rotate(-18deg); }
.pata.p2{ top:38px;    left:44px;   transform:rotate(10deg);  font-size:clamp(14px,4vw,20px); }
.pata.p3{ top:16px;    right:12px;  transform:rotate(20deg);  }
.pata.p4{ top:42px;    right:46px;  transform:rotate(-12deg); font-size:clamp(14px,4vw,20px); }
.pata.p5{ bottom:14px; left:22px;   transform:rotate(8deg);   font-size:clamp(14px,4vw,18px); }
.pata.p6{ bottom:14px; right:20px;  transform:rotate(-8deg);  font-size:clamp(14px,4vw,18px); }

.badge-eyebrow{
  position:relative;
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(228,167,59,.16);
  border:1px solid rgba(228,167,59,.5);
  color:var(--gold-500);
  font-size:11px;
  font-weight:700;
  letter-spacing:.14em;
  text-transform:uppercase;
  padding:6px 14px;
  border-radius:999px;
  margin-bottom: clamp(16px,4vw,20px);
}

/* Foto: centrada por completo DENTRO del header, sin cortes */
.foto-wrap{
  position:relative;
  width: clamp(128px, 34vw, 168px);
  height: clamp(128px, 34vw, 168px);
  margin-bottom: clamp(14px,4vw,18px);
}

.foto{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  display:block;
  border:6px solid var(--cream);
  box-shadow:0 14px 30px rgba(0,0,0,.35);
  background:#fff;
}

.foto-skeleton{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:6px solid var(--cream);
  background:linear-gradient(100deg, #d8d0bd 30%, #eee7d6 50%, #d8d0bd 70%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  box-shadow:0 14px 30px rgba(0,0,0,.25);
}
@keyframes shimmer{
  0%{ background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.header h1{
  position:relative;
  color:#FBF7EF;
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size:clamp(24px, 6.5vw, 30px);
  line-height:1.15;
  letter-spacing:-.01em;
}
#textoNombre{
  display:inline-block;
}

.paw-icon{
  font-size:0.6em;
  vertical-align:3px;
  opacity:.85;
}

/* ---------- PANEL (beige, sin cajas blancas) ---------- */
.panel{
  background:#EFE4CE;
  border-top-left-radius: clamp(20px,5vw,26px);
  border-top-right-radius: clamp(20px,5vw,26px);
  padding: clamp(20px,5vw,26px) clamp(20px,6vw,28px) clamp(22px,6vw,26px);
  position:relative;
}

/* ---------- MENSAJE tipo listón ---------- */
.mensaje{
  position:relative;
  margin: 0 auto clamp(20px,5vw,26px);
  padding: 12px 20px;
  text-align:center;
  font-size:clamp(13px, 3.4vw, 14.5px);
  font-weight:700;
  color:var(--forest-900);
  background:#E0A15C;
  border-radius:8px;
  max-width:92%;
}
.mensaje::before,
.mensaje::after{
  content:"";
  position:absolute;
  top:0;
  width:0; height:0;
  border-top:19px solid #C77F3A;
  border-bottom:19px solid transparent;
}
.mensaje::before{ left:-14px; border-left:14px solid transparent; }
.mensaje::after{ right:-14px; border-right:14px solid transparent; }

/* ---------- CONTENIDO / FILAS ---------- */
.contenido{
  display:flex;
  flex-direction:column;
  gap: clamp(14px,3.6vw,17px);
}

.item{
  display:flex;
  align-items:center;
  gap:14px;
}

.icono{
  flex:0 0 auto;
  width: clamp(34px,9vw,38px);
  height: clamp(34px,9vw,38px);
  border-radius:50%;
  background:var(--forest-700);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  box-shadow:0 3px 8px rgba(15,61,51,.25);
}
.icono.dorado{
  background:var(--gold-500);
  box-shadow:0 3px 8px rgba(196,142,45,.3);
}

.texto-fila{
  flex:1 1 auto;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:1px;
  line-height:1.3;
}

.etiqueta{
  font-weight:600;
  color:var(--ink-600);
  font-size:clamp(11px, 2.9vw, 12px);
}

.valor{
  color:var(--ink-900);
  font-weight:700;
  font-size:clamp(14px, 3.7vw, 15.5px);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ---------- BOTÓN ---------- */
.llamar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(135deg, var(--gold-500), var(--gold-600));
  color:#2A1B02;
  text-decoration:none;
  text-align:center;
  padding: clamp(14px,4vw,17px);
  margin: clamp(18px,5vw,22px) clamp(18px,6vw,28px) 8px;
  border-radius:14px;
  font-size:clamp(15px, 4vw, 17px);
  font-weight:800;
  letter-spacing:.01em;
  box-shadow:0 12px 24px -8px rgba(228,167,59,.55);
  transition:transform .15s ease, box-shadow .15s ease;
}
.llamar:active{
  transform:scale(.98);
  box-shadow:0 6px 14px -6px rgba(228,167,59,.55);
}

/* ---------- FOOTER ---------- */
.footer{
  text-align:center;
  padding: 4px 20px clamp(18px,5vw,24px);
  color:var(--ink-600);
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.footer .dot{
  width:5px; height:5px; border-radius:50%; background:var(--green-500);
}

/* ---------- RESPONSIVE FINO ---------- */
@media (max-width:360px){
  .texto-fila{ flex-direction:column; align-items:flex-start; gap:2px; }
  .valor{ text-align:left; white-space:normal; }
}

@media (min-width:600px){
  body{ align-items:center; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
}

</style>
</head>

<body>

<div id="cargando">
  <div class="spinner"></div>
  Cargando datos de la mascota...
</div>

<div class="tarjeta">

  <div class="header">
    <svg class="pata p1" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>
    <svg class="pata p2" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>
    <svg class="pata p3" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>
    <svg class="pata p4" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>
    <svg class="pata p5" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>
    <svg class="pata p6" viewBox="0 0 64 64" width="1em" height="1em"><ellipse cx="32" cy="42" rx="15" ry="11"/><circle cx="13" cy="21" r="7"/><circle cx="27" cy="9" r="7"/><circle cx="41" cy="9" r="7"/><circle cx="53" cy="21" r="7"/></svg>

    <span class="badge-eyebrow">🛡️ Mascota protegida</span>

    <div class="foto-wrap">
      <div id="fotoSkeleton" class="foto-skeleton"></div>
      <img id="foto" class="foto" src="" style="display:none;">
    </div>

    <h1><span class="paw-icon">🐾</span> <span id="textoNombre">Cargando...</span> <span class="paw-icon">🐾</span></h1>
  </div>

  <div class="panel">

    <div class="mensaje">
      ❤️ Si me encuentras, ayúdame a volver a casa
    </div>

    <div class="contenido">

      <div class="item">
        <div class="icono">👤</div>
        <div class="texto-fila">
          <span class="etiqueta">Propietario</span>
          <span class="valor" id="propietario">---</span>
        </div>
      </div>

      <div class="item">
        <div class="icono">📞</div>
        <div class="texto-fila">
          <span class="etiqueta">Teléfono</span>
          <span class="valor" id="telefono">---</span>
        </div>
      </div>

      <div class="item">
        <div class="icono dorado">🎨</div>
        <div class="texto-fila">
          <span class="etiqueta">Color</span>
          <span class="valor" id="color">---</span>
        </div>
      </div>

      <div class="item">
        <div class="icono dorado">🍖</div>
        <div class="texto-fila">
          <span class="etiqueta">Alimento</span>
          <span class="valor" id="alimento">---</span>
        </div>
      </div>

      <div class="item">
        <div class="icono">🩺</div>
        <div class="texto-fila">
          <span class="etiqueta">Observación</span>
          <span class="valor" id="observacion">---</span>
        </div>
      </div>

      <div class="item">
        <div class="icono dorado">🎂</div>
        <div class="texto-fila">
          <span class="etiqueta">Nacimiento</span>
          <span class="valor" id="nacimiento">---</span>
        </div>
      </div>

    </div>

    <a id="llamar" class="llamar" href="#">
      📞 LLAMAR AL PROPIETARIO
    </a>

    <div class="footer">
      <span class="dot"></span> Mascota protegida con NFC
    </div>

  </div>

</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

fetch("https://script.google.com/macros/s/AKfycbxiu4-AEzDHc-KDhGY-4aHmpscSWHZB-cOa_nY8_2I73M9uDfQXN2m828pBRGya61Uj7Q/exec?id=" + id)
.then(r => r.json())
.then(d => {
console.log(d);
document.getElementById("textoNombre").innerText = d.nombre || "MASCOTA";
document.getElementById("propietario").innerText = d.propietario || "---";
document.getElementById("telefono").innerText = d.telefono || "---";
document.getElementById("nacimiento").innerText = d.nacimiento || "---";

if(document.getElementById("color"))
document.getElementById("color").innerText = d.color || "---";

if(document.getElementById("alimento"))
document.getElementById("alimento").innerText = d.alimento || "---";

if(document.getElementById("observacion"))
document.getElementById("observacion").innerText = d.observacion || "---";

const foto = document.getElementById("foto");
const fotoSkeleton = document.getElementById("fotoSkeleton");

foto.onload = function () {
  foto.style.display = "block";
  if(fotoSkeleton) fotoSkeleton.style.display = "none";
};

foto.src = d.foto + "?v=" + Date.now();
document.getElementById("llamar").href =
"tel:" + d.telefono;
document.getElementById("cargando").style.display = "none";
});
</script>
</body>
</html>
