<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mascota NFC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#145a4a,#2ecc71);
padding:20px;
}

/* TARJETA */
.tarjeta{
max-width:500px;
margin:auto;
background:#fffaf3;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

/* HEADER */
/* HEADER */
.header{
background:linear-gradient(180deg,#0f766e,#22c55e);
padding:30px 20px;
text-align:center;
}
.header h1{
color:white;
font-size:38px;
margin-top:40px;
}

.foto{
width:230px;
height:230px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 10px 30px rgba(0,0,0,.35);
margin-bottom:-35px;
background:white;
}


/* MENSAJE (más oscuro y legible como pediste) */
.mensaje{
background:#ffffff;
margin:30px 20px 20px;
padding:18px;
border-radius:18px;
text-align:center;
font-size:19px;
font-weight:bold;
color:#2c3e50;
box-shadow:0 8px 20px rgba(0,0,0,.12);
border-left:6px solid #22c55e;
}
/* CONTENIDO */
.contenido{
padding:10px 25px 25px;
}

.item{
background:#f8f9fa;
margin-bottom:12px;
padding:15px;
border-radius:12px;
font-size:18px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
border:none;
}

.etiqueta{
font-weight:bold;
color:#2d3436;
}

.valor{
color:#444;
}

/* BOTÓN */
.llamar{
display:block;
background:linear-gradient(135deg,#27ae60,#1e8449);
color:white;
text-decoration:none;
text-align:center;
padding:18px;
margin:25px;
border-radius:15px;
font-size:22px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>
<div id="cargando" style="text-align:center;color:white;font-size:22px;font-weight:bold;padding:20px;">
🐾 Cargando datos de la mascota...
</div>
<div class="tarjeta">

<div class="header">
  <img id="foto" class="foto" src="" style="display:none;">
  <h1 id="nombre">
    🐾 <span id="textoNombre">Cargando...</span> 🐾
  </h1>
</div>

<div class="mensaje">
❤️ Si me encuentras, ayúdame a volver a casa ❤️
</div>

<div class="contenido">

<div class="item"><span class="etiqueta">👤 Propietario:</span> <span class="valor" id="propietario">---</span></div>
<div class="item"><span class="etiqueta">📞 Teléfono:</span> <span class="valor" id="telefono">---</span></div>

<div class="item"><span class="etiqueta">🎨 Color:</span> <span class="valor" id="color">---</span></div>

<div class="item"><span class="etiqueta">🍖 Alimento:</span> <span class="valor" id="alimento">---</span></div>

<div class="item"><span class="etiqueta">🩺 Observación:</span> <span class="valor" id="observacion">---</span></div>
<div class="item"><span class="etiqueta">🎂 Nacimiento:</span> <span class="valor" id="nacimiento">---</span></div>
</div>

<a id="llamar" class="llamar" href="#">
📞 LLAMAR AL PROPIETARIO
</a>

<div class="footer">
Mascota protegida con NFC
</div>

</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

fetch("https://script.google.com/macros/s/AKfycbxiu4-AEzDHc-KDhGY-4aHmpscSWHZB-cOa_nY8_2I73M9uDfQXN2m828pBRGya61Uj7Q/exec?id=" + id)
.then(r => r.json())
.then(d => {
console.log(d);
document.getElementById("textoNombre").innerText = d.nombre || "MASCOTA";
document.getElementById("propietario").innerText = d.propietario || "---";
document.getElementById("telefono").innerText = d.telefono || "---";
document.getElementById("nacimiento").innerText = d.nacimiento || "---";

if(document.getElementById("color"))
document.getElementById("color").innerText = d.color || "---";

if(document.getElementById("alimento"))
document.getElementById("alimento").innerText = d.alimento || "---";

if(document.getElementById("observacion"))
document.getElementById("observacion").innerText = d.observacion || "---";

const foto = document.getElementById("foto");

foto.onload = function () {
  foto.style.display = "block";
};

foto.src = d.foto + "?v=" + Date.now();
document.getElementById("llamar").href =
"tel:" + d.telefono;
document.getElementById("cargando").style.display = "none";
});
</script>
</body>
</html>
