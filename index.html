
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mascota NFC</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: #e8f5e9;
    background-image: url("https://www.transparenttextures.com/patterns/paw-print.png");
    text-align:center;
}

/* TARJETA */
.card{
    background:white;
    max-width:420px;
    margin:40px auto;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    overflow:hidden;
}

/* ENCABEZADO */
.header{
    background: linear-gradient(135deg,#43a047,#1b5e20);
    color:white;
    padding:20px;
    font-size:20px;
    font-weight:bold;
}

/* IMAGEN */
img{
    width:100%;
    height:320px;
    object-fit:cover;
}

/* INFO */
.info{
    padding:20px;
}

.name{
    font-size:26px;
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:10px;
}

.phone{
    font-size:18px;
    color:#555;
    margin-bottom:20px;
}

/* BOTÓN LLAMAR */
.btn{
    display:block;
    background: linear-gradient(135deg,#4caf50,#2e7d32);
    color:white;
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.03);
    background:#1b5e20;
}

/* ICONO PATA */
.paws{
    font-size:30px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="card">

    <div class="header">
        🐾 Perfil Mascota NFC 🐾
    </div>

    <img id="foto" src="https://i.postimg.cc/bJ8mLpMk/b705cacc-1420-460f-8abd-6b98fa37a7fb.jpg">

    <div class="info">
        <div class="name" id="nombre">Nombre de la Mascota</div>
        <div class="phone" id="telefono">Teléfono: ---</div>

        <a id="llamar" class="btn" href="#">📞 LLAMAR AHORA</a>

        <div class="paws">🐾 🐾 🐾</div>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const nombre = params.get("nombre");
const foto = params.get("foto");
const tel = params.get("tel");

if(nombre) document.getElementById("nombre").innerText = nombre;
if(foto) document.getElementById("foto").src = foto;

if(tel){
    document.getElementById("telefono").innerText = "Teléfono: " + tel;
    document.getElementById("llamar").href = "tel:" + tel;
}
</script>

</body>
</html>
